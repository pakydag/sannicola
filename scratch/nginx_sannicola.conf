server {
    listen 80;
    listen [::]:80;
    server_name sannicola.cedam.it;

    client_max_body_size 64M;

    root /var/www/sannicola/public;
    index index.php index.html index.htm;

    access_log /var/log/nginx/sannicola_access.log;
    error_log /var/log/nginx/sannicola_error.log;

    # Reindirizza la radice a /sannicola/
    location = / {
        return 301 /sannicola/;
    }

    # Gestione della sottocartella /sannicola
    location = /sannicola {
        return 301 /sannicola/;
    }

    location /sannicola/ {
        alias /var/www/sannicola/public/;
        try_files $uri $uri/ /sannicola/index.php?$query_string;
    }

    # Mappatura corretta degli asset statici tramite alias per rimuovere il prefisso /sannicola/
    # Rimosso try_files per evitare bug di risoluzione alias con regex in Nginx
    location ~* ^/sannicola/(build|storage|css|js|images)/(.*)$ {
        alias /var/www/sannicola/public/$1/$2;
        access_log off;
        expires 30d;
    }

    # Configurazione PHP per Laravel nella sottocartella /sannicola
    # Evitiamo di usare snippets/fastcgi-php.conf che contiene "try_files $fastcgi_script_name =404"
    # poiché $fastcgi_script_name (/sannicola/index.php) non esiste fisicamente in quella sottocartella.
    location ~ ^/sannicola/index\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
    }

    # Blocca accesso diretto ad altri file PHP sotto /sannicola/
    location ~ ^/sannicola/.*\.php$ {
        return 404;
    }

    # Blocca tutti gli altri file PHP al di fuori di /sannicola/ (es. /index.php alla radice)
    location ~ \.php$ {
        return 403;
    }
}
